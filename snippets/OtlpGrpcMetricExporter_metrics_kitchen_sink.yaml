file_format: "1.1"

meter_provider:
  readers:
    - periodic:
        exporter:
          otlp_grpc:
            # SNIPPET_START
            endpoint: http://localhost:4317
            tls:
              ca_file: /app/cert.pem
              key_file: /app/cert.pem
              cert_file: /app/cert.pem
              insecure: false
            headers:
              - name: api-key
                value: "1234"
            headers_list: "api-key=1234"
            compression: gzip
            max_request_size: 67108864
            max_response_size: 4194304
            timeout: 10000
